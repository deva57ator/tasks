<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Минимальный таск-трекер — MVP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;500;600;700;800&family=PT+Sans:wght@400;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-content">
      <div class="sidebar-close-row">
        <button type="button" class="sidebar-close" id="sidebarClose" aria-label="Закрыть меню">×</button>
      </div>
      <div>
        <div class="nav">
          <button class="nav-btn is-active" data-view="all">Все</button>
          <button class="nav-btn" data-view="today">Сегодня</button>
          <button class="nav-btn" data-view="sprint">Спринт</button>

          <div class="projects" id="projectsBlock">
            <div class="proj-header">
              <div class="proj-title">Проекты</div>
              <button class="proj-add" id="projAdd" title="Добавить проект">＋</button>
            </div>
            <div class="proj-list" id="projList"></div>
          </div>

        </div>
      </div>

      <div class="sidebar-bottom">
        <section class="calendar" id="calendar">
          <div class="cal-header">
            <button class="cal-today" id="calToday" aria-label="Текущий месяц" title="Перейти к текущему месяцу"></button>
            <div class="cal-title" id="calTitle">Месяц ГГГГ</div>
            <div class="cal-ctrls">
              <button class="cal-arrow" id="calPrev" aria-label="Предыдущий месяц">‹</button>
              <button class="cal-arrow" id="calNext" aria-label="Следующий месяц">›</button>
              <button class="cal-collapse" id="calToggle" aria-label="Свернуть календарь" aria-pressed="false" title="Свернуть календарь">▾</button>
            </div>
          </div>
          <div class="cal-legend">
            <div>n</div><div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
          </div>
          <div class="cal-viewport">
            <div class="cal-track" id="calTrack">
              <div class="cal-month" id="calCurr"></div>
              <div class="cal-month" id="calNextBuf"></div>
            </div>
          </div>
        </section>

        <div class="yearplan-access">
          <button class="nav-btn yearplan-btn" id="yearPlanNav" data-view="year">Год</button>
        </div>
      </div>
    </div>

    <div class="sidebar-resizer" id="sidebarResizer" aria-hidden="true"></div>

  </aside>

  <main class="main">
    <div class="header">
      <div class="header-top">
        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Открыть меню" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <rect y="2" width="18" height="2" rx="1" fill="currentColor"/>
            <rect y="8" width="18" height="2" rx="1" fill="currentColor"/>
            <rect y="14" width="18" height="2" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <div class="header-leading">
          <div class="title" id="viewTitle">Все задачи</div>
          <div class="sprint-filters" id="sprintFilters" aria-hidden="true"></div>
        </div>
        <div class="header-tools">
          <div class="workday-bar" id="workdayBar" aria-live="polite">
            <div class="workday-stats">
              <div class="workday-stat">
                <span class="workday-stat-label">Готово</span>
                <span class="workday-stat-value" id="workdayDone">0</span>
              </div>
              <div class="workday-stat workday-stat--time">
                <span class="workday-stat-label">
                  Время
                </span>
                <span class="workday-stat-value" id="workdayTime">0 мин</span>
                <span class="workday-rec" id="workdayRec" aria-hidden="true">
                  <span class="workday-rec-dot" aria-hidden="true"></span>
                </span>
              </div>
            </div>
            <button type="button" class="workday-finish" id="workdayFinishBtn">Закрыть день</button>
          </div>
          <div class="header-actions">
            <button
              type="button"
              class="icon-btn settings-btn"
              id="apiSettingsBtn"
              aria-label="Настройки приложения"
              title="Настройки приложения"
            ></button>
            <button
              type="button"
              class="icon-btn theme-btn"
              id="themeToggle"
              aria-label="Переключить на тёмную тему"
              aria-pressed="false"
              title="Переключить на тёмную тему"
            ></button>
          </div>
        </div>
      </div>
    </div>
    <div class="composer">
      <input id="taskInput" class="input" type="text" placeholder="Что нужно сделать?" />
      <button id="addBtn" class="add-btn">Добавить</button>
    </div>
    <div class="tasks" id="tasks"></div>
    <section class="completed-dock" id="completedDock" aria-hidden="true"></section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="context-menu" id="ctxMenu" role="menu" aria-hidden="true"></div>
  <div class="context-menu" id="dueMenu" aria-hidden="true"></div>
  <div class="context-menu" id="projCtxMenu" role="menu" aria-hidden="true"></div>
  <div class="context-menu emoji-menu" id="emojiMenu" role="menu" aria-hidden="true"></div>
  <div class="ctx-submenu" id="ctxSub" aria-hidden="true"></div>

  <button id="storageToggle" class="storage-toggle" type="button" aria-live="polite" title="Переключить хранилище"></button>

  <div class="api-settings-overlay" id="apiSettingsOverlay" aria-hidden="true">
    <div class="api-settings-dialog" id="apiSettingsDialog" role="dialog" aria-modal="true" aria-labelledby="apiSettingsTitle">
      <button type="button" class="api-settings-close" id="apiSettingsClose" aria-label="Закрыть окно">×</button>
      <div class="api-settings-sidebar" aria-label="Разделы настроек">
        <div class="api-settings-sidebar-header">
          <div class="api-settings-title" id="apiSettingsTitle">Настройки</div>
        </div>
        <nav class="api-settings-nav">
          <button type="button" class="api-settings-nav-item is-active" data-settings-section="server" aria-current="page">
            <span class="api-settings-nav-icon api-settings-nav-icon--server" aria-hidden="true"></span>
            <span>
              <span class="api-settings-nav-label">Сервер</span>
            </span>
          </button>
          <button type="button" class="api-settings-nav-item" data-settings-section="display">
            <span class="api-settings-nav-icon api-settings-nav-icon--display" aria-hidden="true"></span>
            <span>
              <span class="api-settings-nav-label">Вид</span>
            </span>
          </button>
        </nav>
      </div>
      <div class="api-settings-content">
        <section class="api-settings-section is-active" data-settings-panel="server" aria-labelledby="apiSettingsServerTitle">
          <div class="api-settings-header">
            <div class="api-settings-section-title" id="apiSettingsServerTitle">Сервер</div>
            <div class="api-settings-description" id="apiSettingsEnv"></div>
            <div class="api-settings-hint" id="apiSettingsHint"></div>
            <div class="api-settings-message" id="apiSettingsMessage"></div>
          </div>
          <form class="api-settings-form" id="apiSettingsForm">
            <div class="api-settings-field">
              <label class="api-settings-label" for="apiKeyInput">Ключ API</label>
              <div class="api-settings-input-wrap">
                <input type="password" class="api-settings-input" id="apiKeyInput" autocomplete="off" />
                <button
                  type="button"
                  class="api-settings-toggle"
                  id="apiKeyToggle"
                  aria-label="Показать ключ API"
                  title="Показать ключ API"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path
                      d="M12 5.5c-4.7 0-8.7 3-10 6.5 1.3 3.5 5.3 6.5 10 6.5s8.7-3 10-6.5c-1.3-3.5-5.3-6.5-10-6.5Zm0 11a4.5 4.5 0 1 1 0-9 4.5 4.5 0 0 1 0 9Zm0-2a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"
                    />
                  </svg>
                </button>
              </div>
            </div>
            <div class="api-settings-error" id="apiSettingsError" role="alert" aria-live="polite"></div>
            <div class="api-settings-actions">
              <button type="button" class="api-settings-secondary" id="apiKeyClear">Очистить</button>
              <div class="api-settings-actions-spacer"></div>
              <button type="button" class="api-settings-secondary" id="apiKeyToLocal">Локально</button>
              <button type="submit" class="api-settings-primary" id="apiSettingsSave">Сохранить</button>
            </div>
          </form>
        </section>
        <section class="api-settings-section" data-settings-panel="display" aria-labelledby="apiSettingsDisplayTitle">
          <div class="api-settings-header">
            <div class="api-settings-section-title" id="apiSettingsDisplayTitle">Вид</div>
          </div>
          <div class="settings-subsection" aria-labelledby="themeSectionTitle">
            <div class="settings-subsection-header">
              <div class="settings-subsection-title" id="themeSectionTitle">Тема</div>
            </div>
            <div class="settings-toggle-group" role="group" aria-label="Режим темы">
              <button type="button" class="settings-choice" data-theme-mode="light">Светлая</button>
              <button type="button" class="settings-choice" data-theme-mode="dark">Тёмная</button>
            </div>
            <div class="settings-palette-grid" id="themePaletteChoices" aria-label="Палитры темы"></div>
            <div class="settings-section-divider" aria-hidden="true"></div>
          </div>
          <div class="settings-subsection" aria-labelledby="fontSectionTitle">
            <div class="settings-subsection-header">
              <div class="settings-subsection-title" id="fontSectionTitle">Шрифт</div>
            </div>
            <select class="settings-select" id="fontSelect" aria-label="Шрифт">
              <option value="plex">IBM Plex Sans</option>
              <option value="inter">Inter</option>
              <option value="manrope">Manrope</option>
              <option value="nunito">Nunito Sans</option>
              <option value="pt">PT Sans</option>
            </select>
            <div class="settings-section-divider" aria-hidden="true"></div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div class="notes-overlay" id="notesOverlay" aria-hidden="true"></div>
  <aside class="notes-sidebar" id="notesSidebar" aria-hidden="true">
    <div class="notes-header">
      <div class="notes-label">Заметки</div>
      <button type="button" class="notes-close" id="notesClose" aria-label="Закрыть заметки">×</button>
    </div>
    <div class="notes-task" id="notesTaskTitle"></div>
    <textarea
      class="notes-input"
      id="notesInput"
      placeholder="Добавьте заметки для этой задачи..."
    ></textarea>
  </aside>

  <div class="time-overlay" id="timeOverlay" aria-hidden="true">
    <div class="time-dialog" role="dialog" aria-modal="true" aria-labelledby="timeDialogTitle">
      <button type="button" class="time-dialog-close" id="timeDialogClose" aria-label="Закрыть окно">×</button>
      <div class="time-dialog-header">
        <div class="time-dialog-title" id="timeDialogTitle">Время</div>
        <div class="time-dialog-subtitle" id="timeDialogSubtitle"></div>
      </div>
      <form class="time-dialog-form" id="timeDialogForm">
        <div class="time-dialog-fields">
          <label class="time-field">
            <span class="time-field-label">Часы</span>
            <input type="number" min="0" inputmode="numeric" class="time-input" id="timeInputHours" />
          </label>
          <label class="time-field">
            <span class="time-field-label">Минуты</span>
            <input type="number" min="0" inputmode="numeric" class="time-input" id="timeInputMinutes" />
          </label>
        </div>
        <div class="time-dialog-presets" id="timeDialogPresets"></div>
        <div class="time-dialog-summary">Итого: <span id="timeDialogSummary">0 мин</span></div>
        <div class="time-dialog-error" id="timeDialogError" role="alert" aria-live="polite"></div>
        <div class="time-dialog-actions">
          <button type="button" class="time-dialog-secondary" id="timeDialogCancel">Отмена</button>
          <button type="submit" class="time-dialog-primary" id="timeDialogSave">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <div class="project-delete-overlay" id="projectDeleteOverlay" aria-hidden="true">
    <div class="project-delete-dialog" id="projectDeleteDialog" role="dialog" aria-modal="true" aria-labelledby="projectDeleteTitle">
      <div class="project-delete-title" id="projectDeleteTitle">В проекте есть инициативы</div>
      <div class="project-delete-list" id="projectDeleteList"></div>
      <div class="project-delete-actions">
        <button type="button" class="project-delete-primary" id="projectDeleteConfirm">Удалить инициативы</button>
        <button type="button" class="project-delete-secondary" id="projectDeleteDetach">Отвязать от проекта</button>
      </div>
    </div>
  </div>

  <div class="workday-overlay" id="workdayOverlay" aria-hidden="true">
    <canvas class="workday-fireworks" id="workdayFireworks" aria-hidden="true"></canvas>
    <div class="workday-dialog" role="dialog" aria-modal="true" aria-labelledby="workdayDialogTitle">
      <button type="button" class="workday-dialog-close" id="workdayDialogClose" aria-label="Закрыть окно">×</button>
      <div class="workday-dialog-header">
        <div class="workday-dialog-title" id="workdayDialogTitle">Итоги дня</div>
        <div class="workday-dialog-range" id="workdayDialogRange"></div>
      </div>
      <div class="workday-summary">
        <div class="workday-summary-item">
          <div class="workday-summary-label">Время</div>
          <div class="workday-summary-value" id="workdaySummaryTime">0 мин</div>
        </div>
        <div class="workday-summary-item">
          <div class="workday-summary-label">Закрыто</div>
          <div class="workday-summary-value" id="workdaySummaryDone">0</div>
        </div>
      </div>
      <div class="workday-dialog-section" id="workdayCompletedSection">
        <div class="workday-dialog-subtitle">Закрыто сегодня</div>
        <div class="workday-dialog-empty" id="workdayDialogCompletedEmpty">Пока ничего</div>
        <ul class="workday-dialog-list" id="workdayCompletedList" aria-live="polite"></ul>
      </div>
      <div class="workday-dialog-section">
        <div class="workday-dialog-subtitle">Осталось</div>
        <div class="workday-dialog-empty" id="workdayDialogEmpty">Всё закрыто</div>
        <ul class="workday-dialog-list" id="workdayPendingList" aria-live="polite"></ul>
      </div>
      <div class="workday-dialog-actions">
        <button type="button" class="workday-dialog-action" id="workdayPostponeBtn">На завтра</button>
        <button type="button" class="workday-dialog-secondary" id="workdayDialogDone">Закрыть день</button>
      </div>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
  <script type="module" src="main.js?v=2026-04-09"></script>
</body>
</html>
